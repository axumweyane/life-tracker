<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>AXIOM — Life Blueprint</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#282828;--border:#333;--text:#e8e8e8;--text2:#888;--text3:#555;--accent:#4f9eff;--accent2:#2d7ad6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316;--purple:#a855f7;--pink:#ec4899;--cyan:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text','Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5;padding-bottom:72px}
.container{max-width:480px;margin:0 auto;padding:12px 14px}
h1{font-size:18px;font-weight:700}
h2{font-size:15px;font-weight:600;color:var(--accent)}
h3{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-blue{background:var(--accent2);color:#fff}
.badge-green{background:#166534;color:var(--green)}
.badge-orange{background:#7c2d12;color:var(--orange)}
.badge-red{background:#7f1d1d;color:var(--red)}
.badge-purple{background:#581c87;color:var(--purple)}
.stat-row{display:flex;gap:8px;margin:8px 0}
.stat-box{flex:1;background:var(--bg3);border-radius:8px;padding:10px;text-align:center}
.stat-box .val{font-size:20px;font-weight:700;color:var(--accent)}
.stat-box .lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.exercise-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.exercise-row:last-child{border-bottom:none}
.exercise-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;color:transparent;font-size:14px;transition:.15s}
.exercise-check.done{background:var(--green);border-color:var(--green);color:#fff}
.exercise-info{flex:1;min-width:0}
.exercise-name{font-weight:600;font-size:13px}
.exercise-name .star{color:var(--orange);margin-left:3px}
.exercise-meta{font-size:12px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.exercise-note{font-size:11px;color:var(--text3);margin-top:3px;font-style:italic}
.exercise-target{font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--bg4);color:var(--accent);flex-shrink:0}
.meal-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.meal-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.meal-time{font-size:12px;color:var(--accent);font-weight:600}
.meal-name{font-weight:600;font-size:13px}
.meal-macros{font-size:11px;color:var(--text2)}
.meal-body{padding:0 14px 12px;border-top:1px solid var(--border)}
.food-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03)}
.food-row:last-child{border-bottom:none}
.food-name{flex:1}
.food-scale{color:var(--text2);width:90px;text-align:right;font-size:11px}
.food-kcal{color:var(--orange);width:50px;text-align:right;font-size:11px;font-weight:600}
.supp-note{font-size:11px;color:var(--purple);margin-top:6px;padding:6px 8px;background:rgba(168,85,247,.08);border-radius:6px}
.timeline-item{display:flex;gap:12px;padding:8px 0;position:relative}
.timeline-time{width:52px;font-size:12px;font-weight:600;color:var(--text2);flex-shrink:0;text-align:right}
.timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0;margin-top:5px;position:relative;z-index:1}
.timeline-dot.active{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.5)}
.timeline-dot.done{background:var(--text3)}
.timeline-content{flex:1;font-size:13px;min-width:0}
.timeline-label{font-size:11px;color:var(--text2)}
.timeline-line{position:absolute;left:64px;top:22px;bottom:-8px;width:2px;background:var(--border)}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);backdrop-filter:blur(20px)}
.tab{flex:1;padding:8px 0 6px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:10px;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.15s}
.tab.active{color:var(--accent)}
.tab svg{width:22px;height:22px}
.checklist-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.checklist-item:last-child{border-bottom:none}
.check-box{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:.15s}
.check-box.done{background:var(--green);border-color:var(--green);color:#fff}
.check-text{font-size:13px}
.check-text.done{text-decoration:line-through;color:var(--text3)}
input[type="number"],input[type="date"]{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;font-family:inherit}
input:focus{outline:none;border-color:var(--accent)}
.btn{background:var(--accent);color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;width:100%;transition:opacity .15s}
.btn:active{opacity:.7}
.btn-sm{padding:8px 14px;width:auto;font-size:12px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.progress-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.section-title{display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px}
.day-selector{display:flex;gap:4px;margin:10px 0}
.day-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:none;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.day-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}
.day-btn.today{border-color:var(--green)}
.collapsible{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapsible.open{max-height:2000px}
.shop-item{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
.shop-qty{color:var(--text2);font-size:12px}
.supp-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.supp-time{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:6px}
.supp-item{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.supp-dose{color:var(--text2);font-size:12px}
.weight-entry{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
.groom-section{margin-bottom:12px}
.groom-section h4{font-size:12px;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:6px;animation:pulse 2s infinite}
.chevron{transition:transform .2s;font-size:12px;color:var(--text3)}
.chevron.open{transform:rotate(180deg)}

/* ===== v2 additions ===== */
/* smooth interactions */
.card{transition:border-color .2s,transform .15s}
.card:active{transform:scale(.998)}
.btn{transition:background .15s,opacity .15s,transform .1s}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.97)}
.check-box,.exercise-check{transition:all .2s cubic-bezier(.4,0,.2,1)}
.check-box:active,.exercise-check:active{transform:scale(.85)}
.tab{transition:color .2s,transform .15s}
.tab:active{transform:scale(.92)}
.day-btn{transition:all .2s}
.badge{transition:transform .15s}

/* keyframes */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.8)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.anim-fade{animation:fadeIn .25s ease-out}
.anim-pop{animation:pop .3s cubic-bezier(.34,1.56,.64,1)}

/* responsive */
@media(min-width:768px){
  .container{max-width:680px;padding:16px 20px}
  h1{font-size:22px}
  h2{font-size:17px}
  .stat-box .val{font-size:24px}
  body{font-size:15px}
}
@media(min-width:1024px){
  .container{max-width:900px;padding:24px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
}
@media(max-width:380px){
  .container{padding:10px 12px}
  h1{font-size:17px}
}

/* buttons */
.btn-danger{background:var(--red)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}

/* segmented control */
.seg{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:12px;gap:2px}
.seg button{flex:1;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:600;padding:8px;border-radius:7px;cursor:pointer;font-family:inherit;transition:all .2s}
.seg button.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(79,158,255,.25)}

/* summary / dashboard */
.summary-card{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
.summary-tile{background:var(--bg3);border-radius:10px;padding:10px}
.summary-tile .ttl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.summary-tile .big{font-size:18px;font-weight:700}
.summary-tile .sub{font-size:11px;color:var(--text2);margin-top:2px}
.trend-up{color:var(--green)}
.trend-down{color:var(--red)}
.trend-flat{color:var(--text2)}

/* progress ring */
.ring{position:relative;width:56px;height:56px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg4);stroke-width:5}
.ring-fg{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .5s ease}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* line chart */
.line-chart{width:100%;height:140px;display:block}
.line-chart .grid-line{stroke:var(--border);stroke-width:.5;stroke-dasharray:2,3}
.line-chart .axis-label{fill:var(--text3);font-size:9px}
.line-chart .data-line{fill:none;stroke:var(--accent);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.line-chart .data-area{fill:url(#areaGrad)}
.line-chart .data-point{fill:var(--accent);stroke:var(--bg2);stroke-width:1.5}
.line-chart .goal-line{stroke:var(--green);stroke-width:1;stroke-dasharray:4,3}

/* habits heatmap */
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hm-cell{aspect-ratio:1;border-radius:3px;background:var(--bg3);position:relative;cursor:pointer;transition:transform .15s}
.hm-cell:hover{transform:scale(1.15);z-index:2}
.hm-cell.filled{background:var(--green)}
.hm-cell.future{opacity:.3;cursor:not-allowed}
.hm-cell.today{box-shadow:0 0 0 2px var(--accent)}
.hm-label{font-size:9px;color:var(--text3);text-align:center;margin-bottom:2px}
.streak-box{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.streak-flame{font-size:22px}
.streak-nums{display:flex;gap:14px;margin-left:auto;text-align:right}
.streak-nums .n{font-size:17px;font-weight:700}
.streak-nums .l{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}

/* food search */
.food-search-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;font-family:inherit}
.food-search-input:focus{outline:none;border-color:var(--accent)}
.food-option{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;font-size:13px;transition:background .15s}
.food-option:hover,.food-option:active{background:var(--bg3)}
.food-option:last-child{border-bottom:none}
.food-cat{font-size:10px;color:var(--text3);margin-left:6px;text-transform:uppercase;letter-spacing:.5px}
.food-kcal-lg{font-size:12px;color:var(--orange);font-weight:600}
.logged-food{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);animation:fadeIn .2s}
.logged-food .info{flex:1}
.logged-food .name{font-size:13px;font-weight:600}
.logged-food .meta{font-size:11px;color:var(--text2)}
.logged-food .x{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px 8px;transition:color .15s}
.logged-food .x:hover{color:var(--red)}

/* water */
.water-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:10px 0}
.water-cup{aspect-ratio:1;border:2px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s;background:var(--bg3)}
.water-cup.filled{background:rgba(6,182,212,.15);border-color:var(--cyan);color:var(--cyan)}
.water-cup:active{transform:scale(.9)}

/* status colors */
.status-good{color:var(--green)}
.status-warn{color:var(--yellow)}
.status-over{color:var(--red)}
.bg-good{background:var(--green)}
.bg-warn{background:var(--yellow)}
.bg-over{background:var(--red)}

/* pomodoro */
.pomo{text-align:center;padding:20px 14px}
.pomo-timer{font-size:48px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-1px;margin:10px 0}
.pomo-mode{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);font-weight:700}
.pomo-ctrls{display:flex;gap:8px;justify-content:center;margin-top:14px}

/* dialog */
.dialog-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;animation:fadeIn .2s}
.dialog{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:360px;width:100%;animation:pop .25s cubic-bezier(.34,1.56,.64,1)}
.dialog h3{color:var(--text);font-size:16px;text-transform:none;letter-spacing:0;margin-bottom:8px}
.dialog p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5}

/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;z-index:150;animation:fadeIn .2s;box-shadow:0 8px 20px rgba(0,0,0,.4)}

/* empty state */
.empty{text-align:center;padding:30px 16px;color:var(--text2);font-size:13px}
.empty .em{font-size:32px;margin-bottom:8px;opacity:.5}

/* loading */
.skeleton{background:linear-gradient(90deg,var(--bg3) 0%,var(--bg4) 50%,var(--bg3) 100%);background-size:200px 100%;animation:shimmer 1.5s infinite;border-radius:6px}

/* scroll margins for collapsible */
.collapsible.open{max-height:4000px}

/* reminder banner */
.reminder{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.3);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--yellow);display:flex;align-items:center;gap:8px;animation:fadeIn .3s}

/* macro pill */
.macro-pills{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.macro-pill{flex:1;min-width:80px;background:var(--bg3);border-radius:8px;padding:8px 10px;text-align:center}
.macro-pill .n{font-size:15px;font-weight:700}
.macro-pill .l{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* section collapse toggle */
.sec-toggle{display:flex;justify-content:space-between;align-items:center;padding:4px 0;cursor:pointer;user-select:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback}=React;

// ============ DATA ============
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const WORKOUTS=[

function todayKey(){return new Date().toISOString().slice(0,10)}
function dateKey(d){return d.toISOString().slice(0,10)}
function getDOW(){return new Date().getDay()} // 0=Sun
function getHHMM(){const d=new Date();return d.getHours()*60+d.getMinutes()}
function parseTime(t){const[h,m]=t.split(':').map(Number);return h*60+(m||0)}
function fmtTime(t){const h=Math.floor(t/60),m=t%60;return `${h}:${String(m).padStart(2,'0')}`}
// unit conversions
const lbToKg=lb=>+(lb/2.2046226218).toFixed(2);
const kgToLb=kg=>+(kg*2.2046226218).toFixed(1);
const inToM=inch=>inch*0.0254;
// Mifflin-St Jeor BMR -> TDEE
function calcBMR(weightLb,heightIn,age,sex){
  const wk=weightLb/2.2046226218, hcm=heightIn*2.54;
  const base=10*wk+6.25*hcm-5*age;
  return Math.round(sex==='male'?base+5:base-161);
}
function calcTDEE(bmr,activity){return Math.round(bmr*activity)}
function calcBMI(weightLb,heightIn){
  const wk=weightLb/2.2046226218, hm=heightIn*0.0254;
  return hm>0?+(wk/(hm*hm)).toFixed(1):0;
}
function bmiCategory(b){
  if(b<18.5)return{label:"Underweight",color:"var(--cyan)"};
  if(b<25)return{label:"Normal",color:"var(--green)"};
  if(b<30)return{label:"Overweight",color:"var(--yellow)"};
  return{label:"Obese",color:"var(--red)"};
}
// streak calc: given map of dateKey->truthy, compute current+best streak ending today
function calcStreak(map){
  let cur=0, best=0, run=0;
  const sorted=Object.keys(map).filter(k=>map[k]).sort();
  if(!sorted.length)return{cur:0,best:0};
  const today=new Date();
  // build set
  const set=new Set(sorted);
  // current streak: walk back from today
  const d=new Date(today);
  while(set.has(dateKey(d))){cur++;d.setDate(d.getDate()-1)}
  // if today not done, still allow yesterday-ending streak? We'll report cur as-is.
  // if cur=0 and yesterday was done, use that as "cur" too
  if(cur===0){
    const y=new Date(today);y.setDate(y.getDate()-1);
    const d2=new Date(y);
    while(set.has(dateKey(d2))){cur++;d2.setDate(d2.getDate()-1)}
  }
  // best streak: walk through sorted
  let prev=null;
  for(const k of sorted){
    const cd=new Date(k);
    if(prev && (cd-prev)/86400000===1)run++;else run=1;
    if(run>best)best=run;
    prev=cd;
  }
  return{cur,best};
}
// export/import all axiom_* keys
function exportAllData(){
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k.startsWith('axiom_'))data[k]=localStorage.getItem(k);
  }
  return JSON.stringify({version:2,exported:new Date().toISOString(),data},null,2);
}
function importAllData(json){
  const parsed=JSON.parse(json);
  if(!parsed.data)throw new Error('Invalid backup');
  // clear existing
  const toRemove=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k.startsWith('axiom_'))toRemove.push(k);
  }
  toRemove.forEach(k=>localStorage.removeItem(k));
  // write new
  Object.entries(parsed.data).forEach(([k,v])=>localStorage.setItem(k,v));
}
function clearAllData(){
  const toRemove=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k.startsWith('axiom_'))toRemove.push(k);
  }
  toRemove.forEach(k=>localStorage.removeItem(k));
}
// days since last date (YYYY-MM-DD)
function daysSince(isoDate){
  if(!isoDate)return null;
  const d=new Date(isoDate);
  return Math.floor((new Date()-d)/86400000);
}

                <div style={{fontSize:14,fontWeight:700,color:'var(--orange)'}}>{meal.kcal}</div>
                <div className="meal-macros">{meal.protein}g P</div>
              </div>
              <span className={`chevron ${isOpen?'open':''}`}>{'▼'}</span>
            </div>
          </div>
          <div className={`collapsible ${isOpen?'open':''}`}>
            <div className="meal-body">
              {meal.foods.map((food,j)=>
                <div key={j} className="food-row">
                  <span className="food-name">{food.f}</span>
                  <span className="food-scale">{food.s}</span>
                  <span className="food-kcal">{food.k}</span>
                </div>
              )}
              {meal.supps&&<div className="supp-note">{meal.supps}</div>}
            </div>
          </div>
        </div>
      })}

      <div style={{fontSize:11,color:'var(--text3)',textAlign:'center',marginTop:8}}>
        {DAYS[selectedDay]} • {dayMeals.total.kcal} kcal • {dayMeals.total.p}g protein • 3.5-4L water
      </div>
    </>}
    </>}
  </>;
}

function FoodLogView({showToast}){
  const tk=todayKey();
  const[log,setLog]=useState(()=>LS.get('food_'+tk,[]));
  const[water,setWater]=useState(()=>LS.get('water_'+tk,0));
  const[query,setQuery]=useState('');
  const[servings,setServings]=useState({});
  const[profile]=useState(()=>LS.get('profile',DEFAULT_PROFILE));
  const weights=LS.get('weights',[]);
  const latest=weights[weights.length-1];
  const curLb=latest?kgToLb(latest.kg):profile.startWeightLb;

  // Targets
  const bmr=calcBMR(curLb,profile.heightIn,profile.age,profile.sex);
  const tdee=calcTDEE(bmr,profile.activity);
  const surplus=profile.goal==='bulk'?400:profile.goal==='cut'?-400:0;
  const target=tdee+surplus;
  const proteinTarget=Math.round(curLb);
  const fatTarget=Math.round(target*.25/9);
  const carbTarget=Math.round((target-proteinTarget*4-fatTarget*9)/4);

  // Totals
  const totals=log.reduce((a,f)=>({k:a.k+f.k,p:a.p+(f.p||0),c:a.c+(f.c||0),f:a.f+(f.f||0)}),{k:0,p:0,c:0,f:0});
  const pctK=totals.k/target;
  const kcalStatus=pctK>1.1?'over':pctK>=.85?'good':pctK>=.5?'warn':'warn';
  const kcalColor={over:'var(--red)',good:'var(--green)',warn:'var(--yellow)'}[kcalStatus];
  const kcalLabel={over:'Over target',good:'On track',warn:pctK<.5?'Far under':'Under'}[kcalStatus];

  // Search
  const q=query.trim().toLowerCase();
  const results=q.length>0?FOOD_DB.filter(f=>f.n.toLowerCase().includes(q)).slice(0,20):[];

  const addFood=(food)=>{
    const mult=parseFloat(servings[food.n])||1;
    const entry={n:food.n,s:food.s,k:Math.round(food.k*mult),p:Math.round(food.p*mult*10)/10,c:Math.round(food.c*mult*10)/10,f:Math.round(food.f*mult*10)/10,mult,t:Date.now()};
    const nl=[...log,entry];
    setLog(nl);LS.set('food_'+tk,nl);
    setQuery('');setServings({});
    showToast&&showToast(`+${entry.k} kcal logged`);
  };
  const removeFood=(idx)=>{
    const nl=log.filter((_,i)=>i!==idx);
    setLog(nl);LS.set('food_'+tk,nl);
  };
  const addWater=(oz)=>{
    const nw=Math.max(0,water+oz);
    setWater(nw);LS.set('water_'+tk,nw);
    if(oz>0)showToast&&showToast(`+${oz} oz water`);
  };
  const resetDay=()=>{
    if(!window.confirm('Clear today’s food log?'))return;
    setLog([]);LS.set('food_'+tk,[]);
    showToast&&showToast('Log cleared');
  };

  return <>
    {/* status */}
    <div className="card" style={{background:`linear-gradient(135deg, var(--bg2), ${kcalColor}11)`,borderColor:kcalColor+'44'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div>
          <div style={{fontSize:10,color:'var(--text2)',textTransform:'uppercase',letterSpacing:.6}}>Today</div>
          <div style={{fontSize:26,fontWeight:700,color:kcalColor}}>{totals.k}<span style={{fontSize:14,color:'var(--text2)',fontWeight:500}}> / {target} kcal</span></div>
          <div style={{fontSize:11,color:kcalColor,fontWeight:600,marginTop:2}}>{kcalLabel} • {Math.round(pctK*100)}%</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:11,color:'var(--text2)'}}>Remaining</div>
          <div style={{fontSize:20,fontWeight:700}}>{Math.max(0,target-totals.k)}</div>
          <div style={{fontSize:10,color:'var(--text2)'}}>kcal</div>
        </div>
      </div>
      <div className="progress-bar" style={{height:8,borderRadius:4}}>
        <div className="progress-fill" style={{width:`${Math.min(100,pctK*100)}%`,background:kcalColor,borderRadius:4}}/>
      </div>
      <div className="macro-pills">
        <div className="macro-pill"><div className="n" style={{color:totals.p>=proteinTarget*.9?'var(--green)':'var(--text)'}}>{Math.round(totals.p)}<span style={{fontSize:10,color:'var(--text2)'}}>/{proteinTarget}g</span></div><div className="l">Protein</div></div>
        <div className="macro-pill"><div className="n">{Math.round(totals.c)}<span style={{fontSize:10,color:'var(--text2)'}}>/{carbTarget}g</span></div><div className="l">Carbs</div></div>
        <div className="macro-pill"><div className="n">{Math.round(totals.f)}<span style={{fontSize:10,color:'var(--text2)'}}>/{fatTarget}g</span></div><div className="l">Fat</div></div>
      </div>
    </div>

    {/* water */}
    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <h3 style={{marginBottom:2}}>Water</h3>
          <div style={{fontSize:20,fontWeight:700,color:'var(--cyan)'}}>{water}<span style={{fontSize:12,color:'var(--text2)',fontWeight:500}}> / 100 oz</span></div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-sm" style={{background:'var(--bg3)',color:'var(--text2)',padding:'8px 10px'}} onClick={()=>addWater(-8)}>−</button>
          <button className="btn btn-sm" style={{background:'var(--cyan)',padding:'8px 14px'}} onClick={()=>addWater(8)}>+8 oz</button>
        </div>
      </div>
      <div className="water-grid">
        {Array.from({length:12}).map((_,i)=>{
          const filled=water>=(i+1)*8;
          return <div key={i} className={`water-cup ${filled?'filled':''}`} onClick={()=>setWater(f=>{const v=(i+1)*8;LS.set('water_'+tk,v);return v})}>{filled?'💧':''}</div>;
        })}
      </div>
      <div className="progress-bar"><div className="progress-fill" style={{width:`${Math.min(100,water)}%`,background:'var(--cyan)'}}/></div>
    </div>

    {/* search + log */}
    <div className="card">
      <h3 style={{marginBottom:8}}>Log Food</h3>
      <input className="food-search-input" placeholder="Search foods (e.g. chicken, rice, eggs)" value={query} onChange={e=>setQuery(e.target.value)}/>
      {q.length>0 && <div style={{marginTop:10,maxHeight:280,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,background:'var(--bg3)'}}>
        {results.length===0 && <div className="empty" style={{padding:20}}>No matches. Try a simpler term.</div>}
        {results.map((f,i)=>{
          const mult=parseFloat(servings[f.n])||1;
          return <div key={i} className="food-option">
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600}}>{f.n}<span className="food-cat">{f.cat}</span></div>
              <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{f.s} • {Math.round(f.k*mult)} kcal • {(f.p*mult).toFixed(1)}g P</div>
            </div>
            <input type="number" step=".25" min=".25" value={servings[f.n]??1} onChange={e=>setServings({...servings,[f.n]:e.target.value})} style={{width:54,padding:'6px 8px',fontSize:12,marginRight:6,background:'var(--bg4)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:6}}/>
            <button className="btn btn-sm" style={{padding:'6px 12px',background:'var(--accent)'}} onClick={()=>addFood(f)}>Add</button>
          </div>;
        })}
      </div>}
    </div>

    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <h3 style={{margin:0}}>Today's Log ({log.length})</h3>
        {log.length>0 && <button className="btn-sm btn-ghost" style={{padding:'4px 10px',fontSize:11}} onClick={resetDay}>Clear</button>}
      </div>
      {log.length===0 ? <div className="empty">
        <div className="em">🍽️</div>
        <div>Nothing logged yet today</div>
        <div style={{fontSize:11,marginTop:4}}>Search above to add your first meal.</div>
      </div> : log.map((f,i)=>
        <div key={i} className="logged-food">
          <div className="info">
            <div className="name">{f.n}{f.mult&&f.mult!==1?` ×${f.mult}`:''}</div>
            <div className="meta">{f.s} • {Math.round(f.k)} kcal • {f.p.toFixed(1)}g P / {f.c.toFixed(1)}g C / {f.f.toFixed(1)}g F</div>
          </div>
          <button className="x" onClick={()=>removeFood(i)} aria-label="remove">×</button>
        </div>
      )}
    </div>
  </>;
}

function LogView({showToast}){
  const[weightInput,setWeightInput]=useState('');
  const[unit,setUnit]=useState(()=>LS.get('weight_unit','lb'));
  const[weights,setWeights]=useState(()=>LS.get('weights',[]));
  const[profile,setProfile]=useState(()=>LS.get('profile',DEFAULT_PROFILE));
  const[showProfile,setShowProfile]=useState(false);

  useEffect(()=>{LS.set('weight_unit',unit)},[unit]);
  useEffect(()=>{LS.set('profile',profile)},[profile]);

  const addWeight=()=>{
    if(!weightInput)return;
    const raw=parseFloat(weightInput);
    if(isNaN(raw)||raw<=0)return;
    const kg=unit==='lb'?lbToKg(raw):raw;
    const entry={date:todayKey(),kg};
    const existing=weights.findIndex(w=>w.date===entry.date);
    const nw=existing>=0?weights.map((w,i)=>i===existing?entry:w):[...weights,entry];
    nw.sort((a,b)=>a.date.localeCompare(b.date));
    setWeights(nw);LS.set('weights',nw);setWeightInput('');
    showToast&&showToast(existing>=0?"Weight updated":"Weight logged ✓");
  };

  const removeWeight=(date)=>{
    const nw=weights.filter(w=>w.date!==date);
    setWeights(nw);LS.set('weights',nw);
    showToast&&showToast("Entry removed");
  };

  const latest=weights.length?weights[weights.length-1]:null;
  const first=weights.length?weights[0]:null;
  const startKg=first?first.kg:lbToKg(profile.startWeightLb);
  const goalKg=lbToKg(profile.goalWeightLb);
  const goalLb=profile.goalWeightLb;
  const curLb=latest?kgToLb(latest.kg):null;
  const gainedKg=latest&&first?(latest.kg-first.kg):0;
  const gainedLb=(gainedKg*2.2046).toFixed(1);
  const goalPct=latest?Math.max(0,Math.min(100,((latest.kg-startKg)/(goalKg-startKg))*100)):0;
  const remainLb=latest?(profile.goalWeightLb-curLb).toFixed(1):0;

  const displayWeight=(kg)=>unit==='lb'?kgToLb(kg).toFixed(1):kg.toFixed(1);
  const uLbl=unit==='lb'?'lb':'kg';

  // BMI
  const bmi=latest?calcBMI(curLb,profile.heightIn):0;
  const bmiCat=bmiCategory(bmi);

  // TDEE / macros
  const bmr=calcBMR(curLb||profile.startWeightLb,profile.heightIn,profile.age,profile.sex);
  const tdee=calcTDEE(bmr,profile.activity);
  const surplus=profile.goal==='bulk'?400:profile.goal==='cut'?-400:0;
  const target=tdee+surplus;
  const proteinG=Math.round(curLb||profile.startWeightLb);
  const fatG=Math.round(target*.25/9);
  const carbG=Math.round((target-proteinG*4-fatG*9)/4);

  // Weekly weigh-in reminder
  const lastEntryDays=latest?daysSince(latest.date):null;
  const showReminder=lastEntryDays===null||lastEntryDays>=7;

  // Line chart SVG
  const chartData=weights.slice(-30);
  const chartW=320,chartH=120,padL=30,padR=10,padT=10,padB=22;
  let chartSVG=null;
  if(chartData.length>=2){
    const vals=chartData.map(w=>unit==='lb'?kgToLb(w.kg):w.kg);
    const minV=Math.min(...vals,unit==='lb'?goalLb:goalKg)-1;
    const maxV=Math.max(...vals,unit==='lb'?goalLb:goalKg)+1;
    const plotW=chartW-padL-padR, plotH=chartH-padT-padB;
    const x=(i)=>padL+(i/(chartData.length-1))*plotW;
    const y=(v)=>padT+plotH-((v-minV)/(maxV-minV))*plotH;
    const pts=chartData.map((w,i)=>`${x(i)},${y(unit==='lb'?kgToLb(w.kg):w.kg)}`).join(' ');
    const area=`M${x(0)},${padT+plotH} L${pts.split(' ').join(' L')} L${x(chartData.length-1)},${padT+plotH} Z`;
    const goalY=y(unit==='lb'?goalLb:goalKg);
    chartSVG=(
      <svg className="line-chart" viewBox={`0 0 ${chartW} ${chartH}`} preserveAspectRatio="none">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--accent)" stopOpacity=".3"/>
            <stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/>
          </linearGradient>
        </defs>
        {[.25,.5,.75].map(p=><line key={p} className="grid-line" x1={padL} y1={padT+plotH*p} x2={chartW-padR} y2={padT+plotH*p}/>)}
        <line className="goal-line" x1={padL} y1={goalY} x2={chartW-padR} y2={goalY}/>
        <text className="axis-label" x={chartW-padR-2} y={goalY-3} textAnchor="end">goal {unit==='lb'?goalLb:goalKg.toFixed(1)}</text>
        <text className="axis-label" x={2} y={padT+6}>{maxV.toFixed(0)}</text>
        <text className="axis-label" x={2} y={chartH-padB+4}>{minV.toFixed(0)}</text>
        <path className="data-area" d={area}/>
        <polyline className="data-line" points={pts}/>
        {chartData.map((w,i)=>{
          const v=unit==='lb'?kgToLb(w.kg):w.kg;
          return <circle key={i} className="data-point" cx={x(i)} cy={y(v)} r={i===chartData.length-1?3.5:2}/>;
        })}
      </svg>
    );
  }

  return <>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <h1>Progress</h1>
      <div className="seg" style={{width:'auto',margin:0}}>
        <button className={unit==='lb'?'active':''} onClick={()=>setUnit('lb')}>LB</button>
        <button className={unit==='kg'?'active':''} onClick={()=>setUnit('kg')}>KG</button>
      </div>
    </div>

    {showReminder && <div className="reminder">
      <span>⚠️</span>
      <span>{lastEntryDays===null?"Log your first weigh-in to start tracking":`${lastEntryDays} days since last weigh-in — weekly weigh-ins recommended`}</span>
    </div>}

    <div className="stat-row">
      <div className="stat-box">
        <div className="val">{latest?displayWeight(latest.kg):'--'}</div>
        <div className="lbl">Current {uLbl}</div>
      </div>
      <div className="stat-box">
        <div className="val" style={{color:gainedKg>0?'var(--green)':gainedKg<0?'var(--red)':'var(--text)'}}>{gainedKg>=0?'+':''}{unit==='lb'?gainedLb:gainedKg.toFixed(1)}</div>
        <div className="lbl">{uLbl} change</div>
      </div>
      <div className="stat-box">
        <div className="val">{unit==='lb'?goalLb:goalKg.toFixed(1)}</div>
        <div className="lbl">Goal {uLbl}</div>
      </div>
    </div>

    <div style={{margin:'8px 0 16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text2)',marginBottom:4}}>
        <span>{unit==='lb'?(first?kgToLb(first.kg).toFixed(0):profile.startWeightLb):startKg.toFixed(1)} {uLbl}</span>
        <span style={{fontWeight:600,color:'var(--accent)'}}>{goalPct.toFixed(0)}% — {Math.abs(remainLb)}lb to go</span>
        <span>{unit==='lb'?goalLb:goalKg.toFixed(1)} {uLbl}</span>
      </div>
      <div className="progress-bar" style={{height:10,borderRadius:5}}>
        <div className="progress-fill" style={{width:`${goalPct}%`,background:`linear-gradient(90deg, var(--accent), var(--green))`,borderRadius:5}}/>
      </div>
    </div>

    {/* BMI + body comp */}
    {latest && <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <h3 style={{marginBottom:4}}>BMI</h3>
          <div style={{fontSize:26,fontWeight:700}}>{bmi}</div>
          <div style={{fontSize:12,color:bmiCat.color,fontWeight:600}}>{bmiCat.label}</div>
        </div>
        <div style={{flex:1,maxWidth:180,marginLeft:12}}>
          <div style={{display:'flex',height:8,borderRadius:4,overflow:'hidden'}}>
            <div style={{flex:'18.5',background:'var(--cyan)'}}/>
            <div style={{flex:'6.5',background:'var(--green)'}}/>
            <div style={{flex:'5',background:'var(--yellow)'}}/>
            <div style={{flex:'10',background:'var(--red)'}}/>
          </div>
          <div style={{position:'relative',height:4}}>
            <div style={{position:'absolute',left:`${Math.min(100,Math.max(0,(bmi-15)/(40-15)*100))}%`,top:-2,width:2,height:14,background:'var(--text)',transform:'translateX(-50%)'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text3)',marginTop:6}}>
            <span>15</span><span>18.5</span><span>25</span><span>30</span><span>40</span>
          </div>
        </div>
      </div>
    </div>}

    <div className="card">
      <h3 style={{marginBottom:8}}>Log Today's Weight</h3>
      <div style={{display:'flex',gap:8}}>
        <input type="number" step="0.1" placeholder={unit==='lb'?'e.g. 120.5':'e.g. 54.7'} value={weightInput} onChange={e=>setWeightInput(e.target.value)} style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&addWeight()}/>
        <button className="btn" style={{width:'auto',padding:'10px 20px'}} onClick={addWeight}>Log {uLbl}</button>
      </div>
    </div>

    {weights.length>=2 && <div className="card">
      <h3 style={{marginBottom:8}}>Weight Trend (last {chartData.length})</h3>
      {chartSVG}
    </div>}

    {weights.length>0 && <div className="card">
      <h3 style={{marginBottom:8}}>History</h3>
      <div style={{maxHeight:220,overflowY:'auto'}}>
        {[...weights].reverse().slice(0,40).map((w,i,arr)=>{
          const prev=arr[i+1];
          const d=prev?w.kg-prev.kg:0;
          return <div key={w.date} className="weight-entry">
            <span style={{color:'var(--text2)'}}>{w.date}</span>
            <span style={{display:'flex',alignItems:'center',gap:8}}>
              {prev && <span style={{fontSize:10,color:d>0?'var(--green)':d<0?'var(--red)':'var(--text2)'}}>{d>0?'+':''}{unit==='lb'?(d*2.2046).toFixed(1):d.toFixed(1)}</span>}
              <span style={{fontWeight:600}}>{displayWeight(w.kg)} {uLbl}</span>
              <button onClick={()=>removeWeight(w.date)} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14,padding:'0 2px'}}>×</button>
            </span>
          </div>;
        })}
      </div>
    </div>}

    {weights.length===0 && <div className="card empty">
      <div className="em">⚖️</div>
      <div>No weight data yet</div>
      <div style={{fontSize:11,marginTop:4}}>Weigh in first thing in the morning for accuracy.</div>
    </div>}

    <div className="section-title">
      <h2>Profile & Targets</h2>
      <button className="btn-sm btn-ghost" style={{padding:'4px 10px',fontSize:11}} onClick={()=>setShowProfile(s=>!s)}>{showProfile?'Done':'Edit'}</button>
    </div>
    <div className="card">
      {showProfile ? <div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <label style={{fontSize:11,color:'var(--text2)'}}>Height (in)
            <input type="number" value={profile.heightIn} onChange={e=>setProfile({...profile,heightIn:+e.target.value})} style={{marginTop:4}}/>
          </label>
          <label style={{fontSize:11,color:'var(--text2)'}}>Age
            <input type="number" value={profile.age} onChange={e=>setProfile({...profile,age:+e.target.value})} style={{marginTop:4}}/>
          </label>
          <label style={{fontSize:11,color:'var(--text2)'}}>Start wt (lb)
            <input type="number" step="0.1" value={profile.startWeightLb} onChange={e=>setProfile({...profile,startWeightLb:+e.target.value})} style={{marginTop:4}}/>
          </label>
          <label style={{fontSize:11,color:'var(--text2)'}}>Goal wt (lb)
            <input type="number" step="0.1" value={profile.goalWeightLb} onChange={e=>setProfile({...profile,goalWeightLb:+e.target.value})} style={{marginTop:4}}/>
          </label>
        </div>
        <div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>Sex</div>
        <div className="seg" style={{marginBottom:10}}>
          <button className={profile.sex==='male'?'active':''} onClick={()=>setProfile({...profile,sex:'male'})}>Male</button>
          <button className={profile.sex==='female'?'active':''} onClick={()=>setProfile({...profile,sex:'female'})}>Female</button>
        </div>
        <div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>Activity level</div>
        <div className="seg" style={{marginBottom:10}}>
          {[[1.2,'Sed'],[1.375,'Light'],[1.55,'Mod'],[1.725,'Hard'],[1.9,'Max']].map(([v,l])=>
            <button key={v} className={profile.activity===v?'active':''} onClick={()=>setProfile({...profile,activity:v})}>{l}</button>
          )}
        </div>
        <div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>Goal</div>
        <div className="seg">
          <button className={profile.goal==='cut'?'active':''} onClick={()=>setProfile({...profile,goal:'cut'})}>Cut</button>
          <button className={profile.goal==='maintain'?'active':''} onClick={()=>setProfile({...profile,goal:'maintain'})}>Maintain</button>

  const[all,setAll]=useState(()=>LS.get('habits_all',{}));
  const[selected,setSelected]=useState(HABITS[0].id);
  const tk=todayKey();

  const toggle=(habitId,dk)=>{
    const next={...all};
    if(!next[habitId])next[habitId]={};
    next[habitId]={...next[habitId],[dk]:!next[habitId][dk]};
    if(!next[habitId][dk])delete next[habitId][dk];
    setAll(next);LS.set('habits_all',next);
  };

  // Generate last 35 days (5 weeks)
  const today=new Date();
  const days=[];
  for(let i=34;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    days.push({date:dateKey(d),day:d.getDay(),isToday:i===0,isFuture:false});
  }
  // Extend to show this week's future days
  for(let i=1;i<=6;i++){
    const d=new Date(today);d.setDate(d.getDate()+i);
    days.push({date:dateKey(d),day:d.getDay(),isToday:false,isFuture:true});
  }

  const selectedHabit=HABITS.find(h=>h.id===selected);

  const selectedStreak=calcStreak(selectedMap);

  // total done today
  const todayDone=HABITS.filter(h=>all[h.id]?.[tk]).length;

  return <>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>

      <div style={{fontSize:24}}>{todayDone===HABITS.length?'🏆':todayDone>=3?'🔥':'✨'}</div>

    {/* Quick toggle all habits */}
    <div className="card">
      <h3 style={{marginBottom:8}}>Today</h3>

        const done=!!all[h.id]?.[tk];
        const st=calcStreak(all[h.id]||{});
        return <div key={h.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>

          <span style={{fontSize:20}}>{h.icon}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:13}}>{h.label}</div>
            <div style={{fontSize:11,color:'var(--text2)'}}>🔥 {st.cur} current • Best {st.best}</div>
          </div>
          <button className={`btn-sm ${selected===h.id?'btn':'btn-ghost'}`} style={{padding:'6px 10px',fontSize:10,width:'auto'}} onClick={()=>setSelected(h.id)}>View</button>
        </div>;
      })}
    </div>

    {/* Selected habit heatmap */}
    {selectedHabit && <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div>
          <h3 style={{marginBottom:2}}>{selectedHabit.icon} {selectedHabit.label}</h3>
          <div style={{fontSize:11,color:'var(--text2)'}}>Last 5 weeks</div>
        </div>
        <div className="streak-nums">
          <div><div className="n" style={{color:selectedHabit.color}}>{selectedStreak.cur}</div><div className="l">Current</div></div>
          <div><div className="n">{selectedStreak.best}</div><div className="l">Best</div></div>
        </div>
      </div>

      {/* Weekday header */}
      <div className="hm-grid" style={{marginBottom:4}}>
        {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} className="hm-label">{d}</div>)}
      </div>
      {/* Heatmap */}
      {(() => {
        const weeks=[];
        // figure out first cell's offset (days[0].day)

function PomodoroView({addHours}){
  const[mode,setMode]=useState('work'); // work | break
  const[left,setLeft]=useState(25*60);
  const[running,setRunning]=useState(false);
  const[cycles,setCycles]=useState(()=>LS.get('pomo_cycles_'+todayKey(),0));

  useEffect(()=>{
    if(!running)return;
    const t=setInterval(()=>{
      setLeft(l=>{
        if(l<=1){
          // flip mode
          setRunning(false);
          if(mode==='work'){
            addHours&&addHours(25/60);
            const nc=cycles+1;
            setCycles(nc);LS.set('pomo_cycles_'+todayKey(),nc);
            setMode('break');return 5*60;
          } else {
            setMode('work');return 25*60;
          }
        }
        return l-1;
      });
    },1000);
    return ()=>clearInterval(t);
  },[running,mode,cycles,addHours]);

  const m=Math.floor(left/60),s=left%60;
  const pct=mode==='work'?(1-left/(25*60))*100:(1-left/(5*60))*100;

  return <div className="card pomo">
    <div className="pomo-mode" style={{color:mode==='work'?'var(--accent)':'var(--green)'}}>{mode==='work'?'FOCUS':'BREAK'}</div>
    <div className="pomo-timer">{String(m).padStart(2,'0')}:{String(s).padStart(2,'0')}</div>
    <div className="progress-bar" style={{height:6,marginBottom:4}}>
      <div className="progress-fill" style={{width:`${pct}%`,background:mode==='work'?'var(--accent)':'var(--green)'}}/>
    </div>
    <div style={{fontSize:11,color:'var(--text2)',marginTop:10}}>🍅 Completed cycles today: <b>{cycles}</b></div>
    <div className="pomo-ctrls">
      <button className="btn" style={{maxWidth:120}} onClick={()=>setRunning(r=>!r)}>{running?'Pause':left===25*60||left===5*60?'Start':'Resume'}</button>
      <button className="btn-secondary btn" style={{maxWidth:120}} onClick={()=>{setRunning(false);setLeft(mode==='work'?25*60:5*60)}}>Reset</button>
    </div>
    <div className="seg" style={{marginTop:14,maxWidth:240,marginLeft:'auto',marginRight:'auto'}}>
      <button className={mode==='work'?'active':''} onClick={()=>{setMode('work');setLeft(25*60);setRunning(false)}}>Work 25</button>
      <button className={mode==='break'?'active':''} onClick={()=>{setMode('break');setLeft(5*60);setRunning(false)}}>Break 5</button>
    </div>
  </div>;
}

function DataManagementView({showToast}){
  const[confirmReset,setConfirmReset]=useState(false);
  const fileRef=React.useRef(null);

  const doExport=()=>{
    try{
      const json=exportAllData();
      const blob=new Blob([json],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=`axiom-backup-${todayKey()}.json`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast&&showToast('Backup downloaded');
    }catch(e){
      showToast&&showToast('Export failed: '+e.message);
    }
  };

  const doImport=(e)=>{
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        importAllData(ev.target.result);
        showToast&&showToast('Data imported — reloading');
        setTimeout(()=>window.location.reload(),900);
      }catch(err){
        showToast&&showToast('Import failed: '+err.message);
      }
    };
    reader.readAsText(file);
  };

  const doReset=()=>{
    clearAllData();
    setConfirmReset(false);
    showToast&&showToast('All data cleared — reloading');
    setTimeout(()=>window.location.reload(),900);
  };

  // compute storage size
  let bytes=0, count=0;
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k.startsWith('axiom_')){count++;bytes+=(k.length+(localStorage.getItem(k)||'').length)}
  }
  const kb=(bytes/1024).toFixed(1);

  return <>
    <h2>Data Management</h2>
    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',padding:'4px 0'}}>
        <span style={{color:'var(--text2)',fontSize:13}}>Stored keys</span>
        <span style={{fontWeight:600,fontSize:13}}>{count}</span>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',padding:'4px 0'}}>
        <span style={{color:'var(--text2)',fontSize:13}}>Size</span>
        <span style={{fontWeight:600,fontSize:13}}>{kb} KB</span>
      </div>
      <div style={{fontSize:11,color:'var(--text3)',marginTop:8,lineHeight:1.5}}>All data lives in your browser's localStorage. Export regularly to avoid losing it if you clear your browser or switch devices.</div>
    </div>

    <div className="card">
      <h3 style={{marginBottom:8}}>Backup</h3>
      <button className="btn" style={{marginBottom:8}} onClick={doExport}>⬇ Export as JSON</button>
      <div style={{fontSize:11,color:'var(--text3)',marginBottom:12}}>Downloads all your data as a single JSON file you can save anywhere.</div>

      <input ref={fileRef} type="file" accept="application/json,.json" style={{display:'none'}} onChange={doImport}/>
      <button className="btn btn-secondary" style={{marginBottom:8}} onClick={()=>fileRef.current&&fileRef.current.click()}>⬆ Import from JSON</button>
      <div style={{fontSize:11,color:'var(--text3)'}}>Replaces all current data with the backup. App will reload.</div>
    </div>

    <div className="card" style={{borderColor:'rgba(239,68,68,.3)'}}>
      <h3 style={{marginBottom:8,color:'var(--red)'}}>Danger Zone</h3>
      <button className="btn btn-danger" onClick={()=>setConfirmReset(true)}>🗑 Reset all data</button>
      <div style={{fontSize:11,color:'var(--text3)',marginTop:8}}>Clears weights, food log, habits, streaks, and all settings. This cannot be undone.</div>
    </div>

    {confirmReset && <div className="dialog-backdrop" onClick={(e)=>e.target.classList.contains('dialog-backdrop')&&setConfirmReset(false)}>
      <div className="dialog">
        <h3>⚠️ Delete everything?</h3>
        <p>This will permanently erase <b>{count} records</b> ({kb} KB). Export a backup first if you might want this later.</p>
        <div className="btn-row">
          <button className="btn btn-secondary" onClick={()=>setConfirmReset(false)}>Cancel</button>
          <button className="btn btn-danger" onClick={doReset}>Delete all</button>
        </div>
      </div>
    </div>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
